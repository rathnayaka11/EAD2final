server.port=8080
spring.application.name=api-gateway
eureka.client.enabled=false
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ? ?????????? ?? ????? ????? ?? ?????? ?????? ?? ??????? ???? ????:
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.web=DEBUG

# ====================================================
# 1. Auth Service Route (Shortcut Syntax)
# ====================================================
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

# ====================================================
# 2. User Service Route
# ====================================================
spring.cloud.gateway.mvc.routes[1].id=user-service
spring.cloud.gateway.mvc.routes[1].uri=http://user-service:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/users/**

# ====================================================
# 3. Appointment Service Route
# ====================================================
spring.cloud.gateway.mvc.routes[2].id=appointment-service
spring.cloud.gateway.mvc.routes[2].uri=http://appointment-service:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/appointments/**

# ====================================================
# 4. Payment Service Route
# ====================================================
spring.cloud.gateway.mvc.routes[3].id=payment-service
spring.cloud.gateway.mvc.routes[3].uri=http://payment-service:8084
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/payments/**

# ====================================================
# 5. Prescription Service Route
# ====================================================
spring.cloud.gateway.mvc.routes[4].id=prescription-service
spring.cloud.gateway.mvc.routes[4].uri=http://prescription-service:8085
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/api/prescriptions/**

# ====================================================
# Global CORS Configuration for Gateway MVC
# ====================================================
spring.cloud.gateway.mvc.cors.configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.mvc.cors.configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.mvc.cors.configurations.[/**].allowed-headers=*
spring.cloud.gateway.mvc.cors.configurations.[/**].allow-credentials=true